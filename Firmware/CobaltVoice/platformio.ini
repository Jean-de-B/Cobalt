; PlatformIO Configuration for Cobalt Voice
; XIAO nRF52840 Sense - Enregistreur vocal avec BLE

[env:xiaoblesense]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840-sense
framework = arduino

; Build flags
build_flags =
    -D CFG_DEBUG=0
    -D CFG_TUD_MSC=0
    -D SPIFLASH_SDFAT=0

; Libraries (TinyUSB est déjà inclus dans le framework)
lib_deps =
    adafruit/Adafruit SPIFlash@^4.3.4

; SdFat est une dépendance de Adafruit_SPIFlash (nécessaire pour la compilation)
; Il n'est pas utilisé directement - on utilise LittleFS sur la flash QSPI

; Upload via USB bootloader (Adafruit nRF52, 1200bps touch reset)
upload_protocol = nrfutil
upload_port = auto

; Serial monitor
monitor_speed = 115200

; Pour le support BLE
lib_archive = no
